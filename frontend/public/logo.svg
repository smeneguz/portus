<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D47A1"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="32" y="32" width="448" height="448" rx="64" fill="url(#bg)"/>
  <!-- Stylised anchor -->
  <!-- Vertical shaft -->
  <line x1="256" y1="120" x2="256" y2="340" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  <!-- Cross bar -->
  <line x1="206" y1="170" x2="306" y2="170" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  <!-- Ring at top -->
  <circle cx="256" cy="108" r="20" fill="none" stroke="#FFFFFF" stroke-width="8"/>
  <!-- Curved flukes at bottom -->
  <path d="M256,340 Q256,380 210,360" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  <path d="M256,340 Q256,380 302,360" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  <!-- Small arrow tips on flukes -->
  <circle cx="210" cy="360" r="6" fill="#FFFFFF"/>
  <circle cx="302" cy="360" r="6" fill="#FFFFFF"/>
  <!-- Document overlay (top right) -->
  <rect x="300" y="100" width="90" height="110" rx="6" fill="#FFFFFF" opacity="0.2"/>
  <rect x="300" y="100" width="90" height="110" rx="6" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
  <!-- Document lines -->
  <line x1="314" y1="128" x2="376" y2="128" stroke="#FFFFFF" stroke-width="2.5" opacity="0.5"/>
  <line x1="314" y1="146" x2="376" y2="146" stroke="#FFFFFF" stroke-width="2.5" opacity="0.5"/>
  <line x1="314" y1="164" x2="360" y2="164" stroke="#FFFFFF" stroke-width="2.5" opacity="0.5"/>
  <!-- Transfer arrows (ownership movement) -->
  <path d="M340,182 L360,195 L340,195" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wave at bottom -->
  <path d="M80,400 Q128,380 176,400 Q224,420 272,400 Q320,380 368,400 Q416,420 432,400" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.3"/>
  <!-- Text -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="48" fill="#FFFFFF" opacity="0.6">PORTUS</text>
</svg>
